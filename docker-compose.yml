# ============================================================
#  本地 AI 推理伺服器 — Docker Compose 生產配置
#  硬體：Dell Pro Max Tower T2 + RTX PRO 6000 96GB
#  模型：Qwen3.6-35B-A3B FP8
#  更新：2026-04-23
# ============================================================
#
#  服務清單與 Port：
#    vLLM       → http://<SERVER_IP>:8000   (推理引擎 API)
#    Dify       → http://<SERVER_IP>:3000   (Agent 建構平台)
#    Open WebUI → http://<SERVER_IP>:8080   (工程師聊天介面)
#    n8n        → http://<SERVER_IP>:5678   (自動化工作流程)
#    Qdrant     → http://<SERVER_IP>:6333   (向量資料庫)
#    Mem0       → http://<SERVER_IP>:8888   (長期記憶服務)
#
#  快速啟動：
#    1. cp .env.example .env  → 修改 .env 中的密碼與 IP
#    2. docker compose up -d
#    3. 瀏覽器開啟 http://<SERVER_IP>:8080
# ============================================================

name: local-ai-server

# ─── 共用網路 ───────────────────────────────────────────────
networks:
  ai-net:
    driver: bridge

# ─── 持久化 Volume ──────────────────────────────────────────
volumes:
  vllm-models:        # 存放 HuggingFace 下載的模型權重
  dify-data:
  dify-db:
  dify-redis:
  open-webui-data:
  qdrant-data:
  mem0-data:
  n8n-data:

# ============================================================
#  LAYER 1 — 推理引擎
# ============================================================

services:

  # ----------------------------------------------------------
  #  vLLM — 主推理引擎（生產用）
  #  OpenAI-compatible API，供 Dify / Open WebUI 呼叫
  # ----------------------------------------------------------
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - vllm-models:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    command: >
      --model Qwen/Qwen3.6-35B-A3B-FP8
      --quantization fp8
      --max-model-len 32768
      --gpu-memory-utilization 0.90
      --tensor-parallel-size 1
      --served-model-name qwen3.6-35b
      --enable-prefix-caching
      --api-key ${VLLM_API_KEY}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - ai-net

  # ----------------------------------------------------------
  #  Ollama — 開發 / 測試用（輕量模型快速切換）
  #  生產流量請走 vLLM:8000
  # ----------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - vllm-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai-net

# ============================================================
#  LAYER 2 — Agent 編排 & 使用者介面
# ============================================================

  # ----------------------------------------------------------
  #  PostgreSQL — Dify 後端資料庫
  # ----------------------------------------------------------
  dify-db:
    image: postgres:15-alpine
    container_name: dify-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dify
      POSTGRES_PASSWORD: ${DIFY_DB_PASSWORD}
      POSTGRES_DB: dify
    volumes:
      - dify-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dify"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-net

  # ----------------------------------------------------------
  #  Redis — Dify 快取與任務佇列
  # ----------------------------------------------------------
  dify-redis:
    image: redis:7-alpine
    container_name: dify-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - dify-redis:/data
    networks:
      - ai-net

  # ----------------------------------------------------------
  #  Dify API — Agent Builder 後端
  # ----------------------------------------------------------
  dify-api:
    image: langgenius/dify-api:latest
    container_name: dify-api
    restart: unless-stopped
    depends_on:
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_started
    environment:
      MODE: api
      SECRET_KEY: ${DIFY_SECRET_KEY}
      DB_USERNAME: dify
      DB_PASSWORD: ${DIFY_DB_PASSWORD}
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/api/storage
      VECTOR_STORE: qdrant
      QDRANT_URL: http://qdrant:6333
      OPENAI_API_BASE: http://vllm:8000/v1
      OPENAI_API_KEY: ${VLLM_API_KEY}
    volumes:
      - dify-data:/app/api/storage
    networks:
      - ai-net

  # ----------------------------------------------------------
  #  Dify Worker — 背景任務處理
  # ----------------------------------------------------------
  dify-worker:
    image: langgenius/dify-api:latest
    container_name: dify-worker
    restart: unless-stopped
    depends_on:
      - dify-api
    environment:
      MODE: worker
      SECRET_KEY: ${DIFY_SECRET_KEY}
      DB_USERNAME: dify
      DB_PASSWORD: ${DIFY_DB_PASSWORD}
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/api/storage
      VECTOR_STORE: qdrant
      QDRANT_URL: http://qdrant:6333
    volumes:
      - dify-data:/app/api/storage
    networks:
      - ai-net

  # ----------------------------------------------------------
  #  Dify Web — Agent Builder 前端介面（管理員用）
  # ----------------------------------------------------------
  dify-web:
    image: langgenius/dify-web:latest
    container_name: dify-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      CONSOLE_API_URL: http://${SERVER_IP}:3000
      APP_API_URL: http://${SERVER_IP}:3000
    depends_on:
      - dify-api
    networks:
      - ai-net

  # ----------------------------------------------------------
  #  Nginx — Dify 反向代理（統一 3000 port）
  # ----------------------------------------------------------
  dify-nginx:
    image: nginx:alpine
    container_name: dify-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/dify.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - dify-api
      - dify-web
    networks:
      - ai-net

  # ----------------------------------------------------------
  #  Open WebUI — 工程師主要聊天介面
  #  預設連接 vLLM:8000（OpenAI-compatible）
  # ----------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      OPENAI_API_BASE_URL: http://vllm:8000/v1
      OPENAI_API_KEY: ${VLLM_API_KEY}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      WEBUI_AUTH: "true"
      DEFAULT_LOCALE: zh-TW
      ENABLE_SIGNUP: "true"          # 首次設定後建議改為 false
      ENABLE_ADMIN_EXPORT: "true"
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      vllm:
        condition: service_healthy
    networks:
      - ai-net

  # ----------------------------------------------------------
  #  n8n — 自動化工作流程（觸發 RCA pipeline 等）
  # ----------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      N8N_HOST: ${SERVER_IP}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://${SERVER_IP}:5678/
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      GENERIC_TIMEZONE: Asia/Taipei
    networks:
      - ai-net

# ============================================================
#  LAYER 3 — 記憶體 & 知識庫
# ============================================================

  # ----------------------------------------------------------
  #  Qdrant — 向量資料庫（Dify RAG + Mem0 共用）
  # ----------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    networks:
      - ai-net

  # ----------------------------------------------------------
  #  Mem0 — 長期跨 session 用戶記憶（選用）
  # ----------------------------------------------------------
  mem0:
    image: mem0ai/mem0:latest
    container_name: mem0
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      - mem0-data:/app/data
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      LLM_PROVIDER: openai
      OPENAI_API_BASE: http://vllm:8000/v1
      OPENAI_API_KEY: ${VLLM_API_KEY}
      OPENAI_MODEL: qwen3.6-35b
    depends_on:
      - qdrant
      - vllm
    networks:
      - ai-net
